name: Build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Haxe
        uses: actions/cache@v3
        with:
          path: ~/haxelib
          key: haxe-${{ runner.os }}

      - name: Setup Haxe
        run: haxelib setup ~/haxelib

      - name: Run Setup Command
        run: ${{ inputs.setupCommand }}

      - name: Build Target
        run: haxelib run lime build ${{ inputs.buildArgs }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
